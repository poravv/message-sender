name: Backend + Database CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAMESPACE: sender

jobs:
  test:
    runs-on: self-hosted
    name: Test Backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci --legacy-peer-deps || npm install --legacy-peer-deps

    - name: Run linting
      run: |
        if grep -q "lint" package.json; then
          npm run lint || echo "Linting completed with warnings"
        else
          echo "No lint script found, skipping..."
        fi

    - name: Run tests
      run: |
        if grep -q "test" package.json; then
          npm test || echo "Tests completed"
        else
          echo "No test script found, skipping..."
        fi

  build-and-deploy:
    needs: test
    runs-on: self-hosted
    name: Build and Deploy Backend + Database
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,format=short
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    # 👇 Aseguramos namespace y secret ANTES de usarlos
    - name: Ensure namespace exists
      run: |
        kubectl apply -f k8s/namespace.yaml

    - name: Create/Update image pull secret
      run: |
        kubectl create secret docker-registry ghcr-secret \
          --docker-server=${{ env.REGISTRY }} \
          --docker-username=${{ github.actor }} \
          --docker-password=${{ secrets.GHCR_PAT }} \
          --namespace=${{ env.NAMESPACE }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create/Update application secrets from GitHub Secrets
      run: |
        echo "🔐 Creating application secrets from GitHub Secrets..."
        kubectl create secret generic backend-env-secrets \
          --namespace=${{ env.NAMESPACE }} \
          --from-literal=PORT="3010" \
          --from-literal=NODE_ENV="${{ secrets.NODE_ENV }}" \
          --from-literal=FIREBASE_SERVICE_ACCOUNT="${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" \
          --from-literal=SESSION_STORE="${{ secrets.SESSION_STORE }}" \
          --from-literal=AUTHORIZED_PHONES="${{ secrets.AUTHORIZED_PHONES }}" \
          --from-literal=FILE_RETENTION_HOURS="${{ secrets.FILE_RETENTION_HOURS }}" \
          --from-literal=MESSAGE_DELAY_MS="${{ secrets.MESSAGE_DELAY_MS }}" \
          --from-literal=LOG_LEVEL="${{ secrets.LOG_LEVEL }}" \
          --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
          --from-literal=REDIS_HOST="${{ secrets.REDIS_HOST }}" \
          --from-literal=REDIS_PORT="${{ secrets.REDIS_PORT }}" \
          --from-literal=REDIS_DB="${{ secrets.REDIS_DB }}" \
          --from-literal=REDIS_TLS="${{ secrets.REDIS_TLS }}" \
          --from-literal=REDIS_TTL_SECONDS="${{ secrets.REDIS_TTL_SECONDS }}" \
          --from-literal=REDIS_QR_TTL_SECONDS="${{ secrets.REDIS_QR_TTL_SECONDS }}" \
          --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
          --from-literal=POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}" \
          --from-literal=POSTGRES_PORT="${{ secrets.POSTGRES_PORT }}" \
          --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
          --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
          --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
          --from-literal=MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}" \
          --from-literal=MINIO_REGION="${{ secrets.MINIO_REGION }}" \
          --from-literal=MINIO_EXTERNAL_ENDPOINT="${{ secrets.MINIO_EXTERNAL_ENDPOINT }}" \
          --from-literal=MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}" \
          --from-literal=MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}" \
          --from-literal=MINIO_SECURE="${{ secrets.MINIO_SECURE }}" \
          --from-literal=MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}" \
          --from-literal=MINIO_FORCE_PATH_STYLE="${{ secrets.MINIO_FORCE_PATH_STYLE }}" \
          --from-literal=MINIO_DELETE_AFTER_SEND="${{ secrets.MINIO_DELETE_AFTER_SEND }}" \
          --from-literal=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
          --from-literal=FIREBASE_AUTH_DOMAIN="${{ secrets.FIREBASE_AUTH_DOMAIN }}" \
          --from-literal=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
          --from-literal=FIREBASE_STORAGE_BUCKET="${{ secrets.FIREBASE_STORAGE_BUCKET }}" \
          --from-literal=FIREBASE_MESSAGING_SENDER_ID="${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" \
          --from-literal=FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}" \
          --from-literal=FIREBASE_MEASUREMENT_ID="${{ secrets.FIREBASE_MEASUREMENT_ID }}" \
          --from-literal=CHATBOT_ENCRYPTION_KEY="${{ secrets.CHATBOT_ENCRYPTION_KEY }}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create PostgreSQL secrets
      run: |
        echo "🔐 Creating PostgreSQL secrets from GitHub Secrets..."
        kubectl create secret generic postgres-secrets \
          --namespace=${{ env.NAMESPACE }} \
          --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
          --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
          --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy PostgreSQL
      run: |
        echo "🐘 Deploying PostgreSQL with Longhorn persistence..."
        kubectl apply -f k8s/postgresql.yaml
        echo "⏳ Waiting for PostgreSQL to be ready..."
        kubectl wait --for=condition=available --timeout=180s deployment/postgres -n ${{ env.NAMESPACE }} || {
          echo "⚠️ PostgreSQL deployment timed out, checking status..."
          kubectl describe deployment/postgres -n ${{ env.NAMESPACE }}
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=postgres
        }

    - name: Deploy configmap
      run: |
        echo "🏗️ Applying backend configmap..."
        kubectl apply -f k8s/configmap.yaml
    
    - name: Get short SHA
      run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

    - name: Deploy backend
      run: |
        echo "🔧 Deploying backend..."

        # Eliminar HPA antiguo si existe (KEDA lo reemplaza)
        kubectl delete hpa sender-backend-hpa -n ${{ env.NAMESPACE }} --ignore-not-found=true

        # Pause KEDA scaling during deploy to prevent scale-to-zero interference
        echo "⏸️ Pausing KEDA ScaledObject during deploy..."
        kubectl patch scaledobject sender-backend-scaledobject -n ${{ env.NAMESPACE }} \
          --type=merge -p '{"metadata":{"annotations":{"autoscaling.keda.sh/paused":"true"}}}' || true

        # Ensure at least 1 replica during deploy
        kubectl scale deployment/sender-backend -n ${{ env.NAMESPACE }} --replicas=1 || true

        kubectl apply -f k8s/backend-deployment.yaml
        kubectl apply -f k8s/pdb.yaml

        echo "🚀 Forzando actualización a la imagen del commit..."
        kubectl set image deployment/sender-backend \
          sender-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA} \
          -n ${{ env.NAMESPACE }}
        kubectl rollout status deployment/sender-backend -n ${{ env.NAMESPACE }} --timeout=600s

        # Resume KEDA scaling after successful deploy
        echo "▶️ Resuming KEDA ScaledObject..."
        kubectl apply -f k8s/keda-scaledobject.yaml
        kubectl patch scaledobject sender-backend-scaledobject -n ${{ env.NAMESPACE }} \
          --type=merge -p '{"metadata":{"annotations":{"autoscaling.keda.sh/paused":"false"}}}' || true

    - name: Debug rollout failure
      if: failure()
      run: |
        echo "🔎 Debugging rollout failure..."
        echo "📋 All pods:"
        kubectl get pods -n ${{ env.NAMESPACE }} -l app=sender-backend -o wide || true
        echo ""
        echo "📋 Deployment status:"
        kubectl describe deployment/sender-backend -n ${{ env.NAMESPACE }} | tail -30 || true
        echo ""
        # Get the NEWEST pod (most recently created)
        NEWPOD=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=sender-backend --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1:].metadata.name}')
        echo "📄 Newest Pod: $NEWPOD"
        kubectl describe pod "$NEWPOD" -n ${{ env.NAMESPACE }} | grep -A5 "State\|Reason\|Message\|Events" || true
        echo ""
        echo "📜 Newest pod logs (last 100 lines):"
        kubectl logs "$NEWPOD" -n ${{ env.NAMESPACE }} --tail=100 || true
        echo ""
        # Resume KEDA on failure too
        echo "▶️ Resuming KEDA after failure..."
        kubectl patch scaledobject sender-backend-scaledobject -n ${{ env.NAMESPACE }} \
          --type=merge -p '{"metadata":{"annotations":{"autoscaling.keda.sh/paused":"false"}}}' || true

    - name: Apply backend ingress
      run: |
        echo "🌐 Applying backend ingress..."
        kubectl delete ingress sender-ingress -n ${{ env.NAMESPACE }} --ignore-not-found=true || true
        kubectl apply -f k8s/ingress.yaml

    - name: Backend health check
      run: |
        echo "🏥 Performing backend health check..."
        sleep 30
        BACKEND_IP=$(kubectl get service sender-backend-service -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.clusterIP}')
        for i in {1..10}; do
          if curl -f http://$BACKEND_IP:80/health > /dev/null 2>&1; then
            echo "✅ Backend health check passed"
            break
          fi
          echo "Attempt $i failed, retrying in 10 seconds..."
          sleep 10
          if [ $i -eq 10 ]; then
            echo "❌ Backend health check failed after 10 attempts"
            kubectl logs deployment/sender-backend -n ${{ env.NAMESPACE }} --tail=50
            exit 1
          fi
        done

    - name: Deployment summary
      if: always()
      run: |
        echo "📋 Deployment Summary:"
        echo "===================="
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Backend + Database deployment successful!"
          echo "🌐 Ingress applied for public access (sender.mindtechpy.net)."
        else
          echo "❌ Deployment failed!"
        fi
        echo ""
        echo "📊 Current status:"
        kubectl get pods -n ${{ env.NAMESPACE }}
        echo ""
        echo "🔗 Services:"
        kubectl get services -n ${{ env.NAMESPACE }}
        echo ""
        echo "🌍 Ingress:"
        kubectl get ingress -n ${{ env.NAMESPACE }}
