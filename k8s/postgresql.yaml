# PostgreSQL Deployment with Longhorn PVC for persistent storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: sender
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# Secret "postgres-secrets" creado dinámicamente por el workflow desde GitHub Secrets
# Ver: .github/workflows/deploy.yml -> "Create PostgreSQL secrets"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sender
  labels:
    app: postgres
    tier: database
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for persistent volume
  selector:
    matchLabels:
      app: postgres
      tier: database
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - secretRef:
            name: postgres-secrets
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-scripts
        configMap:
          name: postgres-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: sender
  labels:
    app: postgres
    tier: database
spec:
  type: ClusterIP
  selector:
    app: postgres
    tier: database
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: sender
data:
  01-init.sql: |
    -- WhatsApp Message Sender Database Schema
    
    -- Extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    
    -- Contacts table
    CREATE TABLE IF NOT EXISTS contacts (
      id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      user_id VARCHAR(255) NOT NULL,
      phone VARCHAR(50) NOT NULL,
      nombre VARCHAR(255),
      sustantivo VARCHAR(50),
      grupo VARCHAR(100),
      source VARCHAR(50) DEFAULT 'manual',
      created_at TIMESTAMPTZ DEFAULT NOW(),
      updated_at TIMESTAMPTZ DEFAULT NOW(),
      last_seen_at TIMESTAMPTZ DEFAULT NOW(),
      UNIQUE(user_id, phone)
    );
    
    CREATE INDEX idx_contacts_user_id ON contacts(user_id);
    CREATE INDEX idx_contacts_phone ON contacts(phone);
    CREATE INDEX idx_contacts_grupo ON contacts(grupo);
    CREATE INDEX idx_contacts_user_grupo ON contacts(user_id, grupo);
    
    -- Campaigns table
    CREATE TABLE IF NOT EXISTS campaigns (
      id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      user_id VARCHAR(255) NOT NULL,
      name VARCHAR(255) NOT NULL,
      status VARCHAR(50) DEFAULT 'queued',
      message_type VARCHAR(50) DEFAULT 'text',
      template_count INTEGER DEFAULT 1,
      total_recipients INTEGER DEFAULT 0,
      sent_count INTEGER DEFAULT 0,
      error_count INTEGER DEFAULT 0,
      created_at TIMESTAMPTZ DEFAULT NOW(),
      updated_at TIMESTAMPTZ DEFAULT NOW(),
      started_at TIMESTAMPTZ,
      finished_at TIMESTAMPTZ
    );
    
    CREATE INDEX idx_campaigns_user_id ON campaigns(user_id);
    CREATE INDEX idx_campaigns_status ON campaigns(status);
    CREATE INDEX idx_campaigns_created_at ON campaigns(created_at DESC);
    
    -- Campaign recipients table
    CREATE TABLE IF NOT EXISTS campaign_recipients (
      id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      campaign_id UUID NOT NULL REFERENCES campaigns(id) ON DELETE CASCADE,
      contact_id UUID REFERENCES contacts(id) ON DELETE SET NULL,
      phone VARCHAR(50) NOT NULL,
      nombre VARCHAR(255),
      sustantivo VARCHAR(50),
      grupo VARCHAR(100),
      status VARCHAR(50) DEFAULT 'queued',
      template_index INTEGER,
      attempts INTEGER DEFAULT 0,
      error_message TEXT,
      created_at TIMESTAMPTZ DEFAULT NOW(),
      updated_at TIMESTAMPTZ DEFAULT NOW(),
      sent_at TIMESTAMPTZ,
      error_at TIMESTAMPTZ
    );
    
    CREATE INDEX idx_recipients_campaign_id ON campaign_recipients(campaign_id);
    CREATE INDEX idx_recipients_status ON campaign_recipients(status);
    CREATE INDEX idx_recipients_phone ON campaign_recipients(phone);
    
    -- Metric events table (for dashboard analytics)
    CREATE TABLE IF NOT EXISTS metric_events (
      id BIGSERIAL PRIMARY KEY,
      user_id VARCHAR(255) NOT NULL,
      event_type VARCHAR(100) NOT NULL,
      campaign_id UUID REFERENCES campaigns(id) ON DELETE SET NULL,
      phone VARCHAR(50),
      contact_id UUID,
      grupo VARCHAR(100),
      error_message TEXT,
      metadata JSONB,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    CREATE INDEX idx_events_user_id ON metric_events(user_id);
    CREATE INDEX idx_events_type ON metric_events(event_type);
    CREATE INDEX idx_events_created_at ON metric_events(created_at DESC);
    CREATE INDEX idx_events_user_date ON metric_events(user_id, created_at DESC);
    CREATE INDEX idx_events_campaign ON metric_events(campaign_id);
    
    -- Monthly stats aggregation table
    CREATE TABLE IF NOT EXISTS monthly_stats (
      id SERIAL PRIMARY KEY,
      user_id VARCHAR(255) NOT NULL,
      month VARCHAR(7) NOT NULL, -- YYYY-MM format
      sent_count INTEGER DEFAULT 0,
      error_count INTEGER DEFAULT 0,
      campaign_count INTEGER DEFAULT 0,
      updated_at TIMESTAMPTZ DEFAULT NOW(),
      UNIQUE(user_id, month)
    );
    
    CREATE INDEX idx_monthly_user ON monthly_stats(user_id);
    CREATE INDEX idx_monthly_month ON monthly_stats(month);
    
    -- Contact stats table
    CREATE TABLE IF NOT EXISTS contact_stats (
      id SERIAL PRIMARY KEY,
      user_id VARCHAR(255) NOT NULL,
      phone VARCHAR(50) NOT NULL,
      contact_id UUID,
      nombre VARCHAR(255),
      grupo VARCHAR(100),
      sent_count INTEGER DEFAULT 0,
      error_count INTEGER DEFAULT 0,
      last_activity_at TIMESTAMPTZ,
      UNIQUE(user_id, phone)
    );
    
    CREATE INDEX idx_contact_stats_user ON contact_stats(user_id);
    CREATE INDEX idx_contact_stats_phone ON contact_stats(phone);
    
    -- Function to update updated_at timestamp
    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ language 'plpgsql';
    
    -- Triggers for updated_at
    CREATE TRIGGER update_contacts_updated_at
      BEFORE UPDATE ON contacts
      FOR EACH ROW
      EXECUTE FUNCTION update_updated_at_column();
    
    CREATE TRIGGER update_campaigns_updated_at
      BEFORE UPDATE ON campaigns
      FOR EACH ROW
      EXECUTE FUNCTION update_updated_at_column();
    
    CREATE TRIGGER update_recipients_updated_at
      BEFORE UPDATE ON campaign_recipients
      FOR EACH ROW
      EXECUTE FUNCTION update_updated_at_column();
    
    -- Templates table
    CREATE TABLE IF NOT EXISTS templates (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id VARCHAR(255) NOT NULL,
      name VARCHAR(255) NOT NULL,
      content TEXT NOT NULL,
      category VARCHAR(100),
      variables TEXT[],
      created_at TIMESTAMPTZ DEFAULT NOW(),
      updated_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_templates_user ON templates(user_id);

    DROP TRIGGER IF EXISTS update_templates_updated_at ON templates;
    CREATE TRIGGER update_templates_updated_at
      BEFORE UPDATE ON templates
      FOR EACH ROW
      EXECUTE FUNCTION update_updated_at_column();

    -- Chatbot configuration table
    CREATE TABLE IF NOT EXISTS chatbot_configs (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id VARCHAR(255) NOT NULL,
      name VARCHAR(255) NOT NULL DEFAULT 'Mi Bot',
      enabled BOOLEAN DEFAULT false,
      active_hours_start TIME DEFAULT '08:00',
      active_hours_end TIME DEFAULT '22:00',
      active_days INTEGER[] DEFAULT '{1,2,3,4,5}',
      cooldown_minutes INTEGER DEFAULT 30,
      only_known_contacts BOOLEAN DEFAULT true,
      max_responses_per_contact INTEGER DEFAULT 5,
      ai_enabled BOOLEAN DEFAULT false,
      ai_provider VARCHAR(50),
      ai_api_key_encrypted TEXT,
      ai_model VARCHAR(100),
      ai_system_prompt TEXT,
      welcome_message TEXT,
      fallback_message TEXT DEFAULT 'No entendí tu mensaje. Escribí "menu" para ver las opciones.',
      created_at TIMESTAMPTZ DEFAULT NOW(),
      updated_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_chatbot_configs_user ON chatbot_configs(user_id);

    -- Chatbot flow nodes table
    CREATE TABLE IF NOT EXISTS chatbot_nodes (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      config_id UUID NOT NULL REFERENCES chatbot_configs(id) ON DELETE CASCADE,
      node_id VARCHAR(100) NOT NULL,
      type VARCHAR(50) NOT NULL,
      content JSONB NOT NULL DEFAULT '{}',
      position_x INTEGER DEFAULT 0,
      position_y INTEGER DEFAULT 0,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_chatbot_nodes_config ON chatbot_nodes(config_id);
    CREATE INDEX IF NOT EXISTS idx_chatbot_nodes_node_id ON chatbot_nodes(config_id, node_id);

    -- Chatbot conversation state table
    CREATE TABLE IF NOT EXISTS chatbot_conversations (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id VARCHAR(255) NOT NULL,
      contact_phone VARCHAR(20) NOT NULL,
      current_node_id VARCHAR(100),
      context JSONB DEFAULT '{}',
      responses_today INTEGER DEFAULT 0,
      last_response_at TIMESTAMPTZ,
      last_human_intervention_at TIMESTAMPTZ,
      is_active BOOLEAN DEFAULT true,
      created_at TIMESTAMPTZ DEFAULT NOW(),
      updated_at TIMESTAMPTZ DEFAULT NOW(),
      UNIQUE(user_id, contact_phone)
    );

    CREATE INDEX IF NOT EXISTS idx_chatbot_conv_user ON chatbot_conversations(user_id);
    CREATE INDEX IF NOT EXISTS idx_chatbot_conv_user_phone ON chatbot_conversations(user_id, contact_phone);

    -- Incoming messages log table
    CREATE TABLE IF NOT EXISTS incoming_messages (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id VARCHAR(255) NOT NULL,
      contact_phone VARCHAR(20) NOT NULL,
      contact_name VARCHAR(255),
      message_text TEXT,
      message_type VARCHAR(50) DEFAULT 'text',
      media_url TEXT,
      is_from_contact BOOLEAN DEFAULT true,
      is_bot_reply BOOLEAN DEFAULT false,
      read BOOLEAN DEFAULT false,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_incoming_user_phone ON incoming_messages(user_id, contact_phone, created_at DESC);
    CREATE INDEX IF NOT EXISTS idx_incoming_user_date ON incoming_messages(user_id, created_at DESC);
    CREATE INDEX IF NOT EXISTS idx_incoming_unread ON incoming_messages(user_id, read, created_at DESC);

    -- Chatbot triggers
    DROP TRIGGER IF EXISTS update_chatbot_configs_updated_at ON chatbot_configs;
    CREATE TRIGGER update_chatbot_configs_updated_at
      BEFORE UPDATE ON chatbot_configs
      FOR EACH ROW
      EXECUTE FUNCTION update_updated_at_column();

    DROP TRIGGER IF EXISTS update_chatbot_conversations_updated_at ON chatbot_conversations;
    CREATE TRIGGER update_chatbot_conversations_updated_at
      BEFORE UPDATE ON chatbot_conversations
      FOR EACH ROW
      EXECUTE FUNCTION update_updated_at_column();

    -- Grant permissions (el owner ya tiene todos los permisos)
