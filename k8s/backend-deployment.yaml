apiVersion: apps/v1
kind: Deployment
metadata:
  name: sender-backend
  namespace: sender
  labels:
    app: sender-backend
    tier: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: sender-backend
      tier: backend
  template:
    metadata:
      labels:
        app: sender-backend
        tier: backend
    spec:
      terminationGracePeriodSeconds: 90
      containers:
      - name: sender-backend
        image: ghcr.io/poravv/message-sender:latest   # 👉 siempre la última
        imagePullPolicy: Always                      # 👉 fuerza pull en cada arranque
        ports:
        - containerPort: 3010
          name: http
        env:
        - name: PORT
          value: "3010"
        - name: NODE_OPTIONS
          value: "--max_old_space_size=384"
        - name: POD_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-env-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
            ephemeral-storage: "512Mi"
          limits:
            memory: "512Mi"
            cpu: "300m"
            ephemeral-storage: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3010
          initialDelaySeconds: 30       # Reducido para startup más rápido
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3010
          initialDelaySeconds: 15       # Reducido para startup más rápido
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh","-c","sleep 15"]
      imagePullSecrets:
      - name: ghcr-secret     # 👉 asegura acceso a GHCR tras reinicios
---
apiVersion: v1
kind: Service
metadata:
  name: sender-backend-service
  namespace: sender
  labels:
    app: sender-backend
    tier: backend
spec:
  type: ClusterIP            # 👉 acceso interno, el Ingress expone públicamente
  selector:
    app: sender-backend
    tier: backend
  ports:
  - port: 80                 # 👉 puerto expuesto hacia el Ingress
    targetPort: 3010         # 👉 apunta al contenedor
    name: http
