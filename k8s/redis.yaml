# Redis interno exclusivo del proyecto sender.
# ClusterIP: accesible solo dentro del cluster, no expuesto a internet.
# Sin password: uso interno, gestionable via kubectl proxy.
# Para limpiar datos: kubectl delete pvc redis-sender-pvc -n sender
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-sender-pvc
  namespace: sender
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sender
  namespace: sender
  labels:
    app: redis-sender
    tier: cache
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis-sender
  template:
    metadata:
      labels:
        app: redis-sender
        tier: cache
    spec:
      containers:
      - name: redis-sender
        image: redis:7.2-alpine
        imagePullPolicy: IfNotPresent
        command:
        - redis-server
        - --appendonly
        - "yes"
        - --appendfsync
        - everysec
        - --save
        - "900 1"
        - --save
        - "300 10"
        - --maxmemory
        - "256mb"
        - --maxmemory-policy
        - allkeys-lru
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-sender-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sender
  namespace: sender
  labels:
    app: redis-sender
    tier: cache
spec:
  type: ClusterIP
  selector:
    app: redis-sender
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
